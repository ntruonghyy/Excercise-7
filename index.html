<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7 - Cards Column</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="border border-secondary-subtle p-3">
            
            <h5 class="fw-bold mb-3">Cards Columns</h5>
            
            <div class="row g-3">
                
                <div class="col-md-4">
                    <div class="card border-primary rounded-0" style="border-width: 4px;">
                        <img src="https://cafefcdn.com/2018/6/16/photo-1-1529146484215497174285.png" class="card-img-top rounded-0" alt="Car 1">
                        <div class="card-body bg-primary text-white text-center py-2 px-1">
                            <p class="card-text" style="font-size: 0.85rem;">Some text inside the first card</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card border-warning rounded-0" style="border-width: 4px;">
                        <img src="https://hoanghamobile.com/tin-tuc/wp-content/uploads/2024/07/anh-o-to-21.jpg" alt="Car 2">
                        <div class="card-body bg-warning text-dark text-center py-2 px-1">
                            <p class="card-text" style="font-size: 0.85rem;">Some text inside the first card</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card border-danger rounded-0" style="border-width: 4px;">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxzxtl8RPjV6-crs-Vlih2WxbU1yDwBof7Wg&s" class="card-img-top rounded-0" alt="Car 3">
                        <div class="card-body bg-danger text-white text-center py-2 px-1">
                            <p class="card-text" style="font-size: 0.85rem;">Some text inside the first card</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
